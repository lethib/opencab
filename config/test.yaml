# Configuration file for test environment

# Logging configuration
logger:
  enable: false
  level: debug
  format: compact

# Server configuration
server:
  host: http://localhost
  port: 5150
  binding: localhost

# Database configuration
database:
  url: postgres://loco:loco@localhost:5432/opencab_test
  enable_logging: false
  connect_timeout: 500
  idle_timeout: 500
  min_connections: 1
  max_connections: 1

# JWT authentication configuration
jwt:
  secret: stD5fLU9skaypSXXOXzg
  expiration: 604800  # 7 days for tests

# CORS configuration
cors:
  allow_origins: ["*"]

# Application configuration
app:
  base_url: http://localhost:5150
